# Render Blueprint — https://render.com/docs/blueprint-spec
# Déploie l'app Vite/React (dossier my-autoecole/) en site statique.
services:
  - type: web
    name: permis-plus
    runtime: static
    # L'app vit dans un sous-dossier du dépôt.
    rootDir: my-autoecole
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
    # SPA (react-router) : toutes les routes servent index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Cache long pour les assets fingerprintés de Vite.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
